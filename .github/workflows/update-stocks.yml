name: Update Stock Prices

on:
  schedule:
    # Every 15 min, Mon-Fri, 9am-5:30pm ET (14:00-22:30 UTC)
    - cron: '*/15 14-22 * * 1-5'
  workflow_dispatch:

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch stock prices
        run: |
          python3 - <<'PYEOF'
          import json, yfinance as yf
          from datetime import datetime, timezone

          SYMBOLS = {
            'TSLA':  'Tesla',
            'INTC':  'Intel',
            'NVDA':  'NVIDIA',
            'SCHD':  'Schwab Dividend',
            'FXAIX': 'Fidelity S&P 500',
            'MAGS':  'Magnificent 7 ETF',
            'FBTC':  'Fidelity Crypto'
          }

          data = {}
          tickers = yf.Tickers(' '.join(SYMBOLS.keys()))

          for symbol, name in SYMBOLS.items():
            try:
              t = tickers.tickers[symbol]
              info = t.fast_info
              price      = float(info.last_price or 0)
              prev_close = float(info.previous_close or price)
              change     = price - prev_close
              change_pct = (change / prev_close * 100) if prev_close else 0
              data[symbol] = {
                'price':      round(price, 4),
                'prev_close': round(prev_close, 4),
                'change':     round(change, 4),
                'change_pct': round(change_pct, 4),
                'name':       name
              }
              print(f'{symbol}: ${price:.2f} ({change_pct:+.2f}%)')
            except Exception as e:
              print(f'{symbol}: ERROR - {e}')
              data[symbol] = {'error': str(e), 'name': name}

          data['updated'] = datetime.now(timezone.utc).isoformat()

          with open('data/stocks.json', 'w') as f:
            json.dump(data, f, indent=2)

          print('\nSaved to data/stocks.json')
          PYEOF

      - name: Commit and push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "chore: update stock prices [$(date -u +'%H:%M UTC')]"
          git push
